<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nomichi CMS — Admin Panel v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --rust:#C94B1A; --rust-d:#A83A12; --rust-tint:#FDF1EB; --rust-tint2:#FAE3D7;
  --ink:#1A1814; --ink2:#2E2B26; --ink3:#4B4741;
  --mid:#7C7670; --fog:#B0AAA2;
  --line:#E9E5DF; --line2:#F2EFE9;
  --bg:#FFFFFF; --bg2:#FAFAF7; --bg3:#F5F2EC;
  --green:#1A6B3A; --green-bg:#E4F5EC;
  --red:#C0392B; --red-bg:#FDECEA;
  --blue:#1A5276; --blue-bg:#EBF5FB;
  --amber:#92620A; --amber-bg:#FEF3C7;
  --purple:#5B2D8E; --purple-bg:#F3EEF9;
  --sw:240px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg2);color:var(--ink);font-size:14px;overflow-x:hidden}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none}
input,textarea,select{font-family:'Inter',sans-serif;outline:none}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:#16120E;color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:200;display:flex;flex-direction:column;overflow-y:auto}
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:62px;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.content{flex:1;padding:28px;max-width:1300px}

/* SIDEBAR */
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px}
.sb-logo{width:36px;height:36px;background:var(--rust);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;flex-shrink:0;letter-spacing:-.02em}
.sb-name{font-weight:700;font-size:15px;letter-spacing:-.02em}
.sb-tag{font-size:10px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.sb-section{padding:16px 20px 5px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.sb-item{display:flex;align-items:center;gap:11px;padding:11px 20px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border-left:3px solid transparent;font-size:13.5px;font-weight:500}
.sb-item:hover{background:rgba(255,255,255,.05);color:#fff}
.sb-item.active{background:rgba(201,75,26,.18);color:#fff;border-left-color:var(--rust)}
.sb-item .ic{font-size:16px;width:20px;text-align:center}
.sb-badge{margin-left:auto;background:var(--rust);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;min-width:20px;text-align:center}
.sb-footer{margin-top:auto;padding:16px 20px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user-name{font-weight:600;font-size:13px;color:rgba(255,255,255,.85)}
.sb-user-email{font-size:11px;color:rgba(255,255,255,.35);margin-top:2px}
.sb-logout{margin-top:10px;width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:rgba(255,255,255,.5);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.sb-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--rust);color:#fff}
.btn-primary:hover{background:var(--rust-d);transform:translateY(-1px)}
.btn-secondary{background:var(--bg3);color:var(--ink2);border:1px solid var(--line)}
.btn-secondary:hover{background:var(--line)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #f5c6c6}
.btn-danger:hover{background:#f5c6c6}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid #b7e4ca}
.btn-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #fde68a}
.btn-purple{background:var(--purple-bg);color:var(--purple);border:1px solid #d6c5f0}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-icon{padding:7px 9px;background:var(--bg3);border:1px solid var(--line);color:var(--ink3);border-radius:7px}
.btn-icon:hover{background:var(--line)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:22px;cursor:pointer;transition:all .2s}
.stat-card:hover{border-color:var(--rust);transform:translateY(-2px);box-shadow:0 6px 24px rgba(201,75,26,.1)}
.stat-icon{font-size:26px;margin-bottom:12px}
.stat-num{font-size:34px;font-weight:800;color:var(--ink);letter-spacing:-.04em;line-height:1}
.stat-label{font-size:12px;color:var(--mid);font-weight:500;margin-top:6px}
.stat-sub{margin-top:10px}

/* TABLE */
.table-wrap{background:var(--bg);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.table-header{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.table-title{font-size:15px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:11px 16px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mid);background:var(--bg2);border-bottom:1px solid var(--line)}
td{padding:13px 16px;border-bottom:1px solid var(--line2);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2)}
.td-actions{display:flex;gap:6px}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
.pill-green{background:var(--green-bg);color:var(--green)}
.pill-red{background:var(--red-bg);color:var(--red)}
.pill-rust{background:var(--rust-tint2);color:var(--rust)}
.pill-blue{background:var(--blue-bg);color:var(--blue)}
.pill-gray{background:var(--bg3);color:var(--mid);border:1px solid var(--line)}
.pill-amber{background:var(--amber-bg);color:var(--amber)}
.pill-purple{background:var(--purple-bg);color:var(--purple)}

/* TOGGLE */
.tog{position:relative;width:38px;height:22px;display:inline-block;cursor:pointer;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--line);border-radius:100px;transition:background .2s}
.tog input:checked+.tog-track{background:var(--rust)}
.tog-thumb{position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.tog input:checked~.tog-thumb{transform:translateX(16px)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.modal{background:var(--bg);border-radius:18px;width:100%;max-width:820px;box-shadow:0 24px 80px rgba(0,0,0,.22)}
.modal-lg{max-width:1020px}
.modal-hdr{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:var(--bg3);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:18px;color:var(--mid);cursor:pointer}
.modal-close:hover{color:var(--ink)}
.modal-body{padding:26px}
.modal-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}

/* TABS */
.tabs{display:flex;gap:2px;padding:4px;background:var(--bg3);border-radius:10px;width:fit-content;margin-bottom:22px}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mid);transition:all .15s;border:none;background:none}
.tab.active{background:var(--bg);color:var(--ink);box-shadow:0 1px 5px rgba(0,0,0,.09)}

/* LIST BUILDER (highlights / inclusions / exclusions) */
.list-builder{display:flex;flex-direction:column;gap:8px}
.list-row{display:flex;align-items:center;gap:8px}
.list-inp{flex:1;padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:var(--bg2);transition:border-color .15s}
.list-inp:focus{border-color:var(--rust);outline:none}
.list-rm{flex-shrink:0;width:30px;height:30px;border:1.5px solid var(--line);border-radius:8px;background:var(--bg3);color:var(--mid);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.list-rm:hover{border-color:var(--red,#e74c3c);color:var(--red,#e74c3c);background:rgba(231,76,60,.08)}

/* ITINERARY BUILDER */
.itin-day{border:1.5px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px}
.itin-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg3);border-bottom:1px solid var(--line)}
.itin-num{font-size:11px;font-weight:800;color:var(--rust);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;min-width:40px}
.itin-inp{flex:1;padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:14px;color:var(--ink);background:var(--bg);font-weight:600}
.itin-inp:focus{border-color:var(--rust);outline:none}
.itin-body{padding:14px;display:flex;flex-direction:column;gap:10px}
.itin-body .field textarea{min-height:70px}
.itin-body .fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* FORM */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.full{grid-column:1/-1}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase}
.field input,.field select,.field textarea{padding:10px 13px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:var(--bg);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--rust)}
.field textarea{resize:vertical;min-height:90px;line-height:1.6}
.field-hint{font-size:11px;color:var(--mid)}
.row-toggle{display:flex;align-items:center;gap:12px}
.row-toggle label{margin:0;font-size:13px;font-weight:500;color:var(--ink2)}

/* CARDS */
.card{background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:22px}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--mid);margin-bottom:16px}

/* IDENTITY CARDS GRID */
.identity-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.identity-card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:18px;position:relative}
.identity-icon{font-size:32px;margin-bottom:12px}
.identity-type{font-size:14px;font-weight:700;margin-bottom:6px}
.identity-desc{font-size:12px;color:var(--mid);line-height:1.6;margin-bottom:14px}
.identity-actions{display:flex;gap:6px;flex-wrap:wrap}

/* RAW MOMENTS GRID */
.moments-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.moment-card{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px}
.moment-loc{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--ink)}
.moment-badge{display:inline-block;font-size:10px;font-weight:700;color:#F59E0B;background:var(--amber-bg);padding:2px 8px;border-radius:100px;margin-bottom:10px}
.moment-actions{display:flex;gap:6px}

/* TRIPS CARD GRID */
.trips-toolbar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.trips-search-wrap{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:0 13px;min-width:220px;flex:1;max-width:320px;transition:border-color .15s}
.trips-search-wrap:focus-within{border-color:var(--rust)}
.trips-search{border:none;outline:none;background:transparent;font-size:13px;color:var(--ink);padding:10px 0;width:100%}
.trips-filters{display:flex;gap:6px;flex-wrap:wrap}
.tflt{padding:8px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:var(--bg);color:var(--mid);transition:all .15s;white-space:nowrap}
.tflt:hover{border-color:var(--rust);color:var(--rust)}
.tflt-on{background:var(--rust);border-color:var(--rust);color:#fff !important}

.trip-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}

.tc-card{background:var(--bg);border:1.5px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s;cursor:default}
.tc-card:hover{box-shadow:0 8px 32px rgba(0,0,0,.1);transform:translateY(-2px)}

.tc-img-wrap{position:relative;height:180px;overflow:hidden;flex-shrink:0}
.tc-img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.tc-card:hover .tc-img{transform:scale(1.04)}
.tc-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,6,.55) 0%,transparent 55%)}

.tc-tier-badge{position:absolute;top:12px;left:12px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:100px;backdrop-filter:blur(6px)}
.tc-tier-green{background:rgba(26,107,58,.85);color:#fff}
.tc-tier-rust{background:rgba(201,75,26,.9);color:#fff}
.tc-tier-purple{background:rgba(124,58,237,.85);color:#fff}

.tc-status-dots{position:absolute;top:12px;right:12px;display:flex;gap:5px;align-items:center}
.tc-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(255,255,255,.5);flex-shrink:0}
.dot-green{background:#22C55E;border-color:rgba(255,255,255,.7)}
.dot-amber{background:#F59E0B;border-color:rgba(255,255,255,.7)}
.dot-blue{background:#3B82F6;border-color:rgba(255,255,255,.7)}
.dot-off{background:rgba(255,255,255,.25)}

.tc-body{padding:16px 18px;flex:1;display:flex;flex-direction:column;gap:8px}

.tc-meta-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--mid)}
.tc-flag{font-size:14px}
.tc-location{flex:1;font-weight:500;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-dur{background:var(--bg3);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--ink3);white-space:nowrap}

.tc-name{font-size:16px;font-weight:800;letter-spacing:-.025em;color:var(--ink);line-height:1.25}

.tc-price-row{display:flex;align-items:flex-end;justify-content:space-between}
.tc-orig-price{font-size:11px;color:var(--fog);text-decoration:line-through}
.tc-price{font-size:20px;font-weight:800;color:var(--rust);letter-spacing:-.03em}
.tc-rating{font-size:12px;color:var(--ink3);display:flex;align-items:center;gap:3px;padding-bottom:2px}
.tc-rev{color:var(--mid);font-size:11px}

.tc-slots-wrap{display:flex;flex-direction:column;gap:5px}
.tc-slots-bar{height:4px;background:var(--bg3);border-radius:100px;overflow:hidden}
.tc-slots-fill{height:100%;border-radius:100px;transition:width .4s}
.tc-slots-label{font-size:11px;color:var(--mid)}

.tc-dep{font-size:11px;color:var(--mid);margin-top:2px}
.tc-dep strong{color:var(--ink2)}

.tc-footer{padding:12px 18px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.tc-toggles{display:flex;gap:14px}
.tc-tog-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none}
.tc-tog-wrap input[type=checkbox]{accent-color:var(--rust);width:14px;height:14px;cursor:pointer}
.tc-tog-label{font-size:11px;font-weight:600;color:var(--mid)}
.tc-tog-wrap:has(input:checked) .tc-tog-label{color:var(--ink2)}

/* SECTION HEAD */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.sec-title{font-size:21px;font-weight:800;letter-spacing:-.03em}
.sec-sub{font-size:13px;color:var(--mid);margin-top:2px}

/* FILTER BAR */
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search-inp{padding:9px 14px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;color:var(--ink);background:var(--bg);min-width:220px}
.search-inp:focus{border-color:var(--rust);outline:none}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--ink);color:#fff;padding:12px 20px;border-radius:11px;font-size:13px;font-weight:500;box-shadow:0 6px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:9px;animation:tin .25s ease;max-width:320px}
.toast.ok{background:#1A6B3A}
.toast.err{background:#C0392B}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* MISC */
.divider{border:none;border-top:1px solid var(--line);margin:20px 0}
.empty{text-align:center;padding:52px 20px;color:var(--mid)}
.empty-icon{font-size:44px;margin-bottom:12px}

/* CHECKBOX GRID */
.checkbox-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}
.checkbox-item{display:flex;align-items:center;gap:8px}
.checkbox-item input[type="checkbox"]{width:16px;height:16px;cursor:pointer}
.checkbox-item label{margin:0;cursor:pointer;font-size:13px}

/* ── INCL/EXCL TILE PICKER ─────────────────────────────────────── */
.incl-repo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:8px}
.incl-tile{display:flex;flex-direction:column;align-items:center;gap:5px;padding:11px 8px;border:1.5px solid var(--line);border-radius:10px;cursor:pointer;background:var(--bg2);transition:all .15s;text-align:center;user-select:none}
.incl-tile:hover{border-color:var(--mid);background:var(--bg3)}
.incl-tile.selected{border-color:var(--green);background:rgba(26,107,58,.12);color:var(--green)}
.incl-tile-icon{font-size:22px;line-height:1}
.incl-tile-name{font-size:11px;font-weight:700;color:inherit;line-height:1.2}
.incl-tile-note{font-size:10px;color:var(--mid);line-height:1.3}
.incl-tile.selected .incl-tile-note{color:var(--green);opacity:.8}
.excl-repo-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
.excl-pill{padding:6px 12px;border:1.5px solid var(--line);border-radius:100px;cursor:pointer;font-size:12px;background:var(--bg2);color:var(--ink2);transition:all .15s;user-select:none}
.excl-pill:hover{border-color:var(--mid)}
.excl-pill.selected{border-color:var(--red);background:rgba(192,57,43,.12);color:#E55A4B}
.incl-custom-input{display:flex;gap:8px;margin-top:10px}
.incl-custom-input input{flex:1;padding:8px 12px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;color:var(--ink);background:var(--bg)}
.incl-custom-list{margin-top:8px;display:flex;flex-direction:column;gap:5px}
.incl-custom-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--bg3);border-radius:7px;font-size:12px;color:var(--ink2)}

/* ── MEDIA SUB-TABS ────────────────────────────────────────────── */
.media-subtabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--line);width:fit-content}
.media-stab{padding:7px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;color:var(--mid);background:transparent;border:none;transition:all .15s}
.media-stab.active{background:var(--ink);color:#fff}
.media-img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.media-img-card{border-radius:11px;overflow:hidden;background:var(--bg2);border:1.5px solid var(--line);transition:border-color .15s}
.media-img-card:hover{border-color:var(--mid)}
.media-img-card img{width:100%;height:130px;object-fit:cover;display:block}
.media-img-meta{padding:10px 12px}

// ── TOAST ──────────────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${type==='ok'?'✅':type==='err'?'❌':'ℹ️'}</span>${msg}`;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

          <input class="trips-search" placeholder="Search trips…" oninput="filterTrips(this.value)">
        </div>
        <div class="trips-filters" id="trip-filter-btns">
          ${['all','join-a-trip','beyond-ordinary','signature-journey'].map(f=>`
            <button class="tflt ${(window._tripFilter||'all')===f?'tflt-on':''}" onclick="setTripFilter('${f}')">${f==='all'?'All':f==='join-a-trip'?'Join a Trip':f==='beyond-ordinary'?'Beyond Ordinary':'Signature Journeys'}</button>`).join('')}

}

function buildTripsCards(trips) {
  const filtered = (window._tripFilter||'all')==='all' ? trips : trips.filter(t=>t.tier===(window._tripFilter||'all'));
  if (!filtered.length) return `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🗺️</div><p>No trips found</p></div>`;

  const tierMeta = {
    'join-a-trip':       { label:'Join a Trip',       cls:'tc-tier-green' },
    'beyond-ordinary':   { label:'Beyond Ordinary',   cls:'tc-tier-rust'  },
    'signature-journey': { label:'Signature Journey', cls:'tc-tier-purple' }
  };

  return filtered.map(t => {
    const tm = tierMeta[t.tier] || { label:t.tier, cls:'tc-tier-green' };
    const pct = t.totalSlots ? Math.round(t.bookedSlots/t.totalSlots*100) : 0;
    const spotsLeft = t.totalSlots ? t.totalSlots - t.bookedSlots : null;
    const urgency = spotsLeft===null ? 'var(--mid)' : spotsLeft<=3 ? 'var(--red)' : spotsLeft<=6 ? '#F59E0B' : 'var(--green)';
    const isExclusive = t.tier === 'beyond-ordinary';
    const isSignature = t.tier === 'signature-journey';

    return `
    <div class="tc-card">
      <div class="tc-img-wrap">
        <img class="tc-img" src="${t.coverImage}" onerror="this.src=''" alt="${t.name}">
        <div class="tc-img-overlay"></div>
        <span class="tc-tier-badge ${tm.cls}">${tm.label}</span>
      </div>

      <div class="tc-body">
        <div class="tc-meta-row">
          <span class="tc-flag">${t.flag}</span>
          <span class="tc-location">${t.location}</span>
          <span class="tc-dur">${t.duration.nights}N</span>
        </div>

        <div class="tc-name">${t.name}</div>

        <div class="tc-price-row">
          <div style="display:flex;align-items:center;gap:8px">
            ${isExclusive
              ? `<span class="tc-price-beyond">Invite-only</span>`
              : isSignature
              ? `<div class="tc-price" style="font-size:16px">₹${(t.basePrice||0).toLocaleString()} <span style="font-size:11px;font-weight:500;color:var(--mid)">/ couple</span></div>`
              : `<div><div class="tc-price">₹${(t.basePrice||0).toLocaleString()}</div>${t.originalPrice?`<div class="tc-orig-price">₹${t.originalPrice.toLocaleString()}</div>`:''}</div>`}
          </div>
          ${t.avgRating?`<div class="tc-rating"><span style="color:#F59E0B">★</span> ${t.avgRating} <span class="tc-rev">(${t.reviewCount})</span></div>`:''}
        </div>

        ${t.totalSlots ? `
        <div class="tc-slots-wrap">
          <div class="tc-slots-bar"><div class="tc-slots-fill" style="width:${pct}%;background:${urgency}"></div></div>
          <div class="tc-slots-label"><span style="color:${urgency};font-weight:700">${spotsLeft} spots left</span><span style="color:var(--mid)"> · ${t.bookedSlots}/${t.totalSlots}</span></div>
        </div>` : ''}

        ${t.nextDeparture && t.nextDeparture!=='flex'?`<div class="tc-dep">🗓 <strong>${t.nextDeparture}</strong>${t.departureCity?' · '+t.departureCity:''}</div>`:''}
      </div>

      <div class="tc-actions-row">
        <div class="tc-status-pills">
          <span class="tc-spill ${t.isActive?'tc-spill-active':'tc-spill-inactive'}" onclick="toggleTrip(${t.id},'isActive',${!t.isActive})" title="Toggle active">${t.isActive?'● Active':'○ Inactive'}</span>
          ${t.isFeatured?`<span class="tc-spill tc-spill-featured" onclick="toggleTrip(${t.id},'isFeatured',false)" title="Remove featured">★ Featured</span>`:`<span class="tc-spill tc-spill-inactive" onclick="toggleTrip(${t.id},'isFeatured',true)" title="Set featured">☆ Feature</span>`}
          ${t.showOnHomepage?`<span class="tc-spill tc-spill-homepage" onclick="toggleTrip(${t.id},'showOnHomepage',false)" title="Remove from homepage">⌂ HP</span>`:`<span class="tc-spill tc-spill-inactive" onclick="toggleTrip(${t.id},'showOnHomepage',true)" title="Add to homepage">⌂</span>`}
        </div>
        <div class="tc-btn-row">
          <button class="btn btn-icon btn-sm" onclick="openTripModal(${t.id})" title="Edit trip">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTrip(${t.id})" title="Delete">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── MEDIA (unified: Trip Gallery + Hero Images + Real Moments) ──────────
let mediaTab = 'trip';
function buildMedia() {
  const tripImgs  = DB.gallery.filter(g => g.category === 'trip'  || !g.category);
  const heroImgs  = DB.gallery.filter(g => g.category === 'hero');
  const moments   = DB.rawMoments;

  const tierMeta = {
    'join-a-trip':       { label:'Join a Trip',       cls:'media-tier-jat' },
    'beyond-ordinary':   { label:'Beyond Ordinary',   cls:'media-tier-bo'  },
    'signature-journey': { label:'Signature Journey', cls:'media-tier-sj'  }
  };

  function galleryTabContent(imgs, category) {
    if (!imgs.length) return `<div class="empty"><div class="empty-icon">🖼️</div><p>No images yet — add one to get started</p></div>`;
    return `<div class="media-img-grid">
      ${imgs.map(img=>{
        const linkedTrip = img.tripId ? DB.trips.find(t=>t.id===img.tripId) : null;
        const tm = linkedTrip ? (tierMeta[linkedTrip.tier] || {}) : {};
        return `
        <div class="media-img-card">
          <img src="${img.url}" alt="${img.alt}" onerror="this.src=''" style="cursor:pointer" onclick="openGalleryImageModal(${img.id},'${category}')">
          <button class="media-img-edit-btn" onclick="openGalleryImageModal(${img.id},'${category}')">✏️ Edit</button>
          <div class="media-img-meta">
            ${linkedTrip && tm.cls ? `<span class="media-tier-tag ${tm.cls}">${tm.label}</span>` : ''}
            <div class="media-img-alt">${img.alt}</div>
            <div class="media-img-trip">📁 ${img.tripName || '—'}</div>
            <div class="media-img-actions">
              ${img.isFeatured?'<span class="pill pill-rust" style="font-size:10px;flex:1">⭐ Featured</span>':'<span style="flex:1"></span>'}
              <button class="btn btn-sm btn-icon" onclick="toggleFeatured(${img.id})" title="${img.isFeatured?'Remove featured':'Set featured'}">⭐</button>
              <button class="btn btn-sm btn-danger" onclick="deleteImage(${img.id})">🗑️</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  function momentsTabContent() {
    if (!moments.length) return `<div class="empty"><div class="empty-icon">📸</div><p>No real moments yet</p></div>`;
    return `<div class="media-moment-grid">
      ${moments.map(m=>`
        <div class="media-moment-card">
          ${m.imageUrl
            ? `<img src="${m.imageUrl}" alt="${m.loc}" onerror="this.parentElement.querySelector('.media-moment-img-placeholder') && (this.style.display='none')">`
            : `<div class="media-moment-img-placeholder">📷</div>`}
          <div class="media-moment-body">
            <div class="media-moment-loc">${m.loc}${m.isFeatured?' <span class="pill pill-rust" style="font-size:10px">Featured</span>':''}</div>
            ${m.caption?`<div class="media-moment-cap">"${m.caption}"</div>`:''}
            ${(m.tags||[]).length?`<div class="media-moment-tags">${m.tags.map(t=>`<span class="media-moment-tag">${t}</span>`).join('')}</div>`:''}
            <div class="media-moment-actions">
              <button class="btn btn-sm btn-icon" onclick="toggleMomentFeatured(${m.id})" title="Toggle featured">⭐</button>
              <button class="btn btn-sm btn-icon" onclick="openMomentModal(${m.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="deleteMoment(${m.id})">🗑️</button>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
  }

  const tabs = [
    { id:'trip',    label:`🖼️ Trip Gallery`,   count:tripImgs.length },
    { id:'hero',    label:`🎬 Hero Images`,     count:heroImgs.length },
    { id:'moments', label:`📸 Real Moments`,    count:moments.length  }
  ];

  let tabContent = '';
  if (mediaTab === 'trip')    tabContent = galleryTabContent(tripImgs, 'trip');
  if (mediaTab === 'hero')    tabContent = galleryTabContent(heroImgs, 'hero');
  if (mediaTab === 'moments') tabContent = momentsTabContent();

  const tabAddBtn = mediaTab === 'moments'
    ? `<button class="btn btn-primary" onclick="openMomentModal(null)">＋ Add Real Moment</button>`
    : `<button class="btn btn-primary" onclick="openGalleryImageModal(null,'${mediaTab}')">＋ Add Image</button>`;

  const tabDesc = {
    trip:    '📸 Photos for trip detail pages — tag to a specific trip and tier',
    hero:    '🎬 Full-bleed backgrounds used as page hero images — tag to a trip or tier',
    moments: '✨ Raw, unfiltered moments — shown in the homepage polaroid gallery strip'
  };

  return `
    <div>
      <div class="sec-head">
        <div>
          <div class="sec-title">Media Library</div>
          <div class="sec-sub">${DB.gallery.length} gallery images · ${moments.length} real moments</div>
        </div>
        ${tabAddBtn}
      </div>

      <div class="media-subtabs">
        ${tabs.map(t=>`
          <button class="media-stab ${mediaTab===t.id?'active':''}" onclick="setMediaTab('${t.id}')">
            ${t.label} <span style="opacity:.6;font-size:11px;font-weight:400;margin-left:3px">(${t.count})</span>
          </button>`).join('')}
      </div>

      <div style="margin-bottom:16px;font-size:12px;color:var(--mid)">${tabDesc[mediaTab]||''}</div>

      ${tabContent}
    </div>`;
}

function buildSuggestions() {
  return `
    <div>
      <div class="sec-head">
        <div><div class="sec-title">Suggestions</div><div class="sec-sub">"Suggest Something" form submissions · ${DB.suggestions.filter(s=>s.status==='new').length} new</div></div>
      </div>
      <div class="filter-bar">
        ${['all','new','viewed','contacted','closed'].map(s=>`<button class="btn btn-secondary btn-sm" onclick="filterSugg('${s}')" style="text-transform:capitalize">${s==='all'?'All':s}</button>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px" id="sugg-grid">${buildSuggCards(DB.suggestions)}</div>
    </div>`;
}

function buildSuggCards(suggestions) {
  const sc = {new:'pill-rust',viewed:'pill-blue',contacted:'pill-green',closed:'pill-gray'};
  const filtered = suggFilter==='all' ? suggestions : suggestions.filter(s=>s.status===suggFilter);
  if(!filtered.length) return '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">💬</div><p>No suggestions found</p></div>';
  return filtered.map(s=>`
    <div class="card ${s.status==='new'?'new':''}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div><div style="font-weight:700;font-size:14px">${s.name}</div><div style="font-size:12px;color:var(--mid)">${s.email}${s.phone?' · '+s.phone:''}</div></div>
        <div style="display:flex;gap:6px;align-items:center"><span class="pill ${sc[s.status]}">${s.status}</span><span style="font-size:18px;cursor:pointer;color:${s.isStarred?'#F59E0B':'var(--fog)'}" onclick="toggleStar(${s.id})">★</span></div>
      </div>
      <div style="font-size:13px;margin-bottom:8px"><span style="color:var(--mid)">Destination:</span> <strong>${s.destination}</strong></div>
      ${s.budget?`<div style="font-size:13px;margin-bottom:8px"><span style="color:var(--mid)">Budget:</span> ${s.budget}</div>`:''}
      <div style="font-size:13px;margin-bottom:8px"><span style="color:var(--mid)">Group:</span> ${s.groupSize} ${s.groupSize===1?'person':'people'}</div>
      ${s.message?`<div style="font-size:12px;color:var(--mid);margin-top:10px;padding-top:10px;border-top:1px solid var(--line2);font-style:italic">"${s.message}"</div>`:''}
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        ${s.status!=='viewed'?`<button class="btn btn-sm btn-secondary" onclick="updateSuggStatus(${s.id},'viewed')">Mark Viewed</button>`:''}
        ${s.status!=='contacted'?`<button class="btn btn-sm btn-success" onclick="updateSuggStatus(${s.id},'contacted')">Mark Contacted</button>`:''}
        ${s.status!=='closed'?`<button class="btn btn-sm btn-amber" onclick="updateSuggStatus(${s.id},'closed')">Close</button>`:''}
        <button class="btn btn-sm btn-danger" onclick="deleteSugg(${s.id})">Delete</button>
      </div>
    </div>`).join('');
}

function openTripModal(id) {
  const t = id ? DB.trips.find(x=>x.id===id) : { id:null, name:'', slug:'', location:'', flag:'🇮🇳', duration:{days:7,nights:6}, basePrice:'', originalPrice:'', tripType:'community', tier:'join-a-trip', filterType:'dom', filterDest:'india', filterCategory:'community', filterDuration:'7plus', signatureSubtype:null, departureCity:'', nextDeparture:'', spotsLeft:4, relatedTrips:[], tags:'', month:'flex', totalSlots:16, bookedSlots:0, coverImage:'', isActive:true, isFeatured:false, showOnHomepage:false, isVisible:true, avgRating:0, reviewCount:0, overview:'', highlights:[], inclusions:[], exclusions:[], itinerary:[] };
  let highlights=[...(t.highlights||[])], inclusions=[...(t.inclusions||[])], exclusions=[...(t.exclusions||[])], itinerary=[...(t.itinerary||[])];
  let activeTab='basic';

  function listBuilder(arr, placeholder, varName) {
    return `<div class="list-builder" id="lb-${varName}">
      ${arr.map((item,i)=>`<div class="list-row"><input class="list-inp" value="${item.replace(/"/g,'&quot;')}" placeholder="${placeholder}" onchange="window._lbData['${varName}'][${i}]=this.value"><button class="list-rm" onclick="window._lbData['${varName}'].splice(${i},1);renderModal()">−</button></div>`).join('')}
      <button class="btn btn-secondary btn-sm" style="margin-top:4px" onclick="window._lbData['${varName}'].push('');renderModal()">＋ Add</button>
    </div>`;
  }

  function itinBuilder() {
    return `<div id="lb-itin">
      ${itinerary.map((day,i)=>`
        <div class="itin-day">
          <div class="itin-hdr">
            <span class="itin-num">Day ${day.day}</span>
            <input class="itin-inp" value="${(day.title||'').replace(/"/g,'&quot;')}" placeholder="Day title" onchange="window._lbData.itin[${i}].title=this.value">
            <button class="list-rm" onclick="window._lbData.itin.splice(${i},1);renderModal()">−</button>
          </div>
          <div class="itin-body">
            <div class="field"><label>Description</label><textarea onchange="window._lbData.itin[${i}].description=this.value">${day.description||''}</textarea></div>
            <div class="fg">
              <div class="field"><label>Meals</label><input value="${day.meals||''}" onchange="window._lbData.itin[${i}].meals=this.value"></div>
              <div class="field"><label>Accommodation</label><input value="${day.accommodation||''}" onchange="window._lbData.itin[${i}].accommodation=this.value"></div>
            </div>
          </div>
        </div>`).join('')}
      <button class="btn btn-secondary btn-sm" onclick="window._lbData.itin.push({day:window._lbData.itin.length+1,title:'',description:'',meals:'',accommodation:''});renderModal()">＋ Add Day</button>
    </div>`;
  }

  function tabContent() {
    if (activeTab==='basic') return `
      <div class="fg">
        <div class="field"><label>Trip Name</label><input id="t-name" value="${(t.name||'').replace(/"/g,'&quot;')}" placeholder="Meghalaya Wonder"></div>

        <div class="field"><label>Flag emoji</label><input id="t-flag" value="${t.flag||'🇮🇳'}"></div>
        <div class="field"><label>Days</label><input id="t-days" type="number" value="${t.duration.days||7}"></div>
        <div class="field"><label>Nights</label><input id="t-nights" type="number" value="${t.duration.nights||6}"></div>
        <div class="field"><label>Base Price (₹)</label><input id="t-price" type="number" value="${t.basePrice||''}"></div>
        <div class="field"><label>Original Price (₹, optional)</label><input id="t-origprice" type="number" value="${t.originalPrice||''}"></div>
        <div class="field"><label>Total Slots</label><input id="t-slots" type="number" value="${t.totalSlots||16}"></div>
        <div class="field"><label>Booked Slots</label><input id="t-booked" type="number" value="${t.bookedSlots||0}"></div>
        <div class="field"><label>Departure City</label><input id="t-depcity" value="${t.departureCity||''}" placeholder="Delhi"></div>
        <div class="field"><label>Next Departure</label><input id="t-nextdep" value="${t.nextDeparture||''}" placeholder="Jun 2026"></div>
        <div class="field full"><label>Cover Image URL</label><input id="t-cover" value="${t.coverImage||''}" placeholder="https://..."></div>
        <div class="field full"><label>Trip Overview</label><textarea id="t-overview">${t.overview||''}</textarea></div>
      </div>`;

    if (activeTab==='details') return `
      <div style="margin-bottom:20px">
        <div class="card-title" style="margin-bottom:12px">✨ Key Highlights</div>
        ${listBuilder(highlights,'Add a highlight','highlights')}
      </div>`;

    if (activeTab==='itinerary') return `
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div class="card-title">Day-by-Day Itinerary</div>
          <button class="btn btn-secondary btn-sm" onclick="generatePdfItinerary(${id||'null'})">📄 Export PDF Itinerary</button>

        ${itinBuilder()}
      </div>`;

    if (activeTab==='inclusions') {
      // Build selected state arrays for inclusions (by repo name match) and exclusions (by string match)
      const selectedInclIds = new Set(
        INCL_REPO.filter(r => inclusions.some(inc => typeof inc==='string' ? inc.includes(r.name) : (inc.name||inc)===r.name)).map(r=>r.id)
      );
      const customInclusions = inclusions.filter(inc => {
        const label = typeof inc==='string' ? inc : (inc.name||inc);

      return `

            <div style="background:var(--bg3);border:1.5px dashed var(--line);border-radius:10px;padding:12px;margin-top:6px">
              <div style="font-size:11px;color:var(--mid);margin-bottom:8px">Add a custom tile with icon, name, and note:</div>
              <div style="display:grid;grid-template-columns:60px 1fr 1fr auto;gap:8px;align-items:flex-end">
                <div>
                  <div style="font-size:10px;font-weight:700;color:var(--mid);margin-bottom:3px;text-transform:uppercase">Icon</div>
                  <input type="text" id="custom-incl-icon" placeholder="🎯" maxlength="2"
                    style="width:100%;text-align:center;font-size:18px;padding:6px 4px;border:1.5px solid var(--line);border-radius:8px;background:var(--bg);color:var(--ink)">
                </div>
                <div>
                  <div style="font-size:10px;font-weight:700;color:var(--mid);margin-bottom:3px;text-transform:uppercase">Name</div>
                  <input type="text" id="custom-incl-name" placeholder="e.g. Stargazing Session"
                    style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;background:var(--bg);color:var(--ink)"
                    onkeydown="if(event.key==='Enter')addCustomIncl()">
                </div>
                <div>
                  <div style="font-size:10px;font-weight:700;color:var(--mid);margin-bottom:3px;text-transform:uppercase">Note</div>
                  <input type="text" id="custom-incl-note" placeholder="Short description (optional)"
                    style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:12px;background:var(--bg);color:var(--ink)"
                    onkeydown="if(event.key==='Enter')addCustomIncl()">
                </div>
                <button class="btn btn-primary btn-sm" style="height:36px;white-space:nowrap" onclick="addCustomIncl()">＋ Add Tile</button>
              </div>
            </div>
          </div>
        </div>

        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div class="card-title" style="color:var(--red)">❌ Not Included</div>
            <span style="font-size:11px;color:var(--mid)">Click pills to select common exclusions</span>
          </div>
          <div class="excl-repo-grid">
            ${EXCL_REPO.map(e=>`
              <span class="excl-pill ${selectedExclIds.has(e)?'selected':''}" onclick="toggleExclPill(this,'${e.replace(/'/g,"\\'")}')">
                ${e}
              </span>`).join('')}
          </div>
          <div style="margin-top:12px">
            <div style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Custom Exclusions</div>
            <div class="incl-custom-list" id="custom-excl-list">
              ${exclusions.filter(e=>!EXCL_REPO.includes(e)).map((e,i)=>`
                <div class="incl-custom-item" id="custom-excl-${i}">
                  <span>${e}</span>
                  <button class="list-rm" onclick="removeCustomExcl(${i})">−</button>
                </div>`).join('')}
            </div>
            <div class="incl-custom-input">
              <input type="text" id="custom-excl-inp" placeholder="Add a custom exclusion…" onkeydown="if(event.key==='Enter')addCustomExcl()">
              <button class="btn btn-secondary btn-sm" onclick="addCustomExcl()">＋ Add</button>
            </div>
          </div>
        </div>
      </div>`;
    }

    if (activeTab==='settings') return `
      <div class="fg">
        <div class="field full">
          <div class="row-toggle" style="margin-bottom:14px">
            <label class="tog"><input type="checkbox" id="t-active" ${t.isActive?'checked':''}><div class="tog-track"></div><div class="tog-thumb"></div></label>
            <label>Active (visible to users)</label>

            <label>Featured (highlighted in listing)</label>
          </div>
          <div class="row-toggle" style="margin-bottom:14px">
            <label class="tog"><input type="checkbox" id="t-homepage" ${t.showOnHomepage?'checked':''}><div class="tog-track"></div><div class="tog-thumb"></div></label>

            <option value="join-a-trip" ${t.tier==='join-a-trip'?'selected':''}>🗺️ Join a Trip</option>

          <select id="t-fcat">
            <option value="community" ${t.filterCategory==='community'?'selected':''}>Community</option>
            <option value="offbeat" ${t.filterCategory==='offbeat'?'selected':''}>Offbeat</option>

  window._lbData = { highlights, inclusions, exclusions, itin: itinerary };

  // Inclusions tile toggle
  window.toggleInclTile = function(repoId, type) {
    const repo = INCL_REPO.find(r=>r.id===repoId);
    if (!repo) return;
    const inclArr = window._lbData.inclusions;
    const existsIdx = inclArr.findIndex(inc => {
      const label = typeof inc==='string' ? inc : (inc.name||inc);
      return label === repo.name || label.includes(repo.name);
    });
    if (existsIdx >= 0) {
      inclArr.splice(existsIdx, 1);
    } else {
      inclArr.push({ icon: repo.icon, name: repo.name, note: repo.note });
    }
    inclusions = inclArr;
    renderModal();
  };

  // Exclusions pill toggle
  window.toggleExclPill = function(el, label) {
    const exclArr = window._lbData.exclusions;
    const idx = exclArr.indexOf(label);
    if (idx >= 0) {
      exclArr.splice(idx, 1);
      el.classList.remove('selected');
    } else {
      exclArr.push(label);
      el.classList.add('selected');
    }
    exclusions = exclArr;
  };

  window.addCustomIncl = function() {
    const iconEl = document.getElementById('custom-incl-icon');
    const nameEl = document.getElementById('custom-incl-name');
    const noteEl = document.getElementById('custom-incl-note');
    const name = nameEl?.value.trim();
    if (!name) { toast('Tile name is required','err'); return; }
    const entry = {
      icon: iconEl?.value.trim() || '✦',
      name: name,
      note: noteEl?.value.trim() || ''
    };
    window._lbData.inclusions.push(entry);
    inclusions = window._lbData.inclusions;
    renderModal();
  };
  window.removeCustomIncl = function(i) {
    const customItems = window._lbData.inclusions.filter(inc => {
      const label = typeof inc==='string' ? inc : (inc.name||inc);
      return !INCL_REPO.some(r => label.includes(r.name));
    });
    const toRemove = customItems[i];
    if (toRemove !== undefined) {
      const globalIdx = window._lbData.inclusions.indexOf(toRemove);
      if (globalIdx >= 0) window._lbData.inclusions.splice(globalIdx, 1);
    }
    inclusions = window._lbData.inclusions;
    renderModal();
  };
  window.addCustomExcl = function() {
    const inp = document.getElementById('custom-excl-inp');
    if (inp && inp.value.trim()) {
      window._lbData.exclusions.push(inp.value.trim());
      exclusions = window._lbData.exclusions;
      renderModal();
    }
  };
  window.removeCustomExcl = function(i) {
    const customItems = window._lbData.exclusions.filter(e => !EXCL_REPO.includes(e));
    const toRemove = customItems[i];
    if (toRemove !== undefined) {
      const globalIdx = window._lbData.exclusions.indexOf(toRemove);
      if (globalIdx >= 0) window._lbData.exclusions.splice(globalIdx, 1);
    }
    exclusions = window._lbData.exclusions;
    renderModal();
  };

  function renderModal() {
    highlights = window._lbData.highlights;
    inclusions = window._lbData.inclusions;
    exclusions = window._lbData.exclusions;
    itinerary = window._lbData.itin;
    document.getElementById('trip-modal-overlay')?.remove();
    const div = document.createElement('div');
    div.id = 'trip-modal-overlay'; div.className = 'overlay';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)';
    div.innerHTML = `
      <div class="modal modal-lg">
        <div class="modal-hdr">
          <span class="modal-title">${id ? 'Edit Trip: '+t.name : 'New Trip'}</span>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body" style="padding-top:18px">
          <div class="tabs">
            ${['basic','details','itinerary','inclusions','settings','website'].map(tab=>`
              <button class="tab ${activeTab===tab?'active':''}" onclick="switchTripTab('${tab}')" style="text-transform:capitalize">${tab==='website'?'🌐 Website':tab==='itinerary'?'📅 Itinerary':tab==='inclusions'?'✅ Inclusions':tab==='details'?'✨ Details':tab==='settings'?'⚙️ Settings':'📝 Basic'}</button>`).join('')}
          </div>
          <div id="trip-tab-content">${tabContent()}</div>
        </div>
        <div class="modal-foot">
          ${activeTab==='itinerary'?'<button class="btn btn-secondary" onclick="generatePdfItinerary('+(id||'null')+')">📄 Export PDF</button>':''}
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveTripFull(${id||'null'})">${id?'Save Changes':'Create Trip'}</button>
        </div>
      </div>`;
    document.body.appendChild(div);
    window.switchTripTab = function(tab) { activeTab=tab; renderModal(); };
  }
  renderModal();
}

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Georgia,serif;color:#1A1814;padding:48px;max-width:800px;margin:0 auto}
    .brand{font-size:22px;font-weight:700;color:#C94B1A;letter-spacing:-.02em;margin-bottom:4px}
    .brand span{color:#7C7670;font-size:13px;font-weight:400;display:block;margin-top:2px}
    h1{font-size:32px;font-weight:700;margin:28px 0 6px;letter-spacing:-.03em}
    .meta{display:flex;gap:24px;margin-bottom:32px;font-size:13px;color:#7C7670;border-bottom:2px solid #E9E5DF;padding-bottom:16px}

    .day{border-left:3px solid #C94B1A;padding:16px 20px;margin-bottom:16px;background:#FAFAF7;border-radius:0 8px 8px 0}
    .day-num{font-size:11px;font-weight:700;color:#C94B1A;text-transform:uppercase;letter-spacing:.06em}
    .day-title{font-size:17px;font-weight:700;margin:4px 0 10px}
    .day-desc{font-size:14px;line-height:1.75;color:#4B4741}
    .day-meta{font-size:12px;color:#7C7670;margin-top:10px}
    ul{padding-left:20px;margin-top:6px}
    li{font-size:14px;line-height:1.8;color:#4B4741}
    .incl-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:8px}
    .incl-col h4{font-size:13px;font-weight:700;margin-bottom:10px}
    .foot{margin-top:48px;padding-top:16px;border-top:1px solid #E9E5DF;font-size:12px;color:#B0AAA2;text-align:center}
    @media print{body{padding:32px}}
  </style></head><body>
  <div class="brand">NOMICHI<span>Wander. Connect. Belong.</span></div>
  <h1>${t.name}</h1>
  <div class="meta">
    <div>📍 <strong>${t.location}</strong></div>
    <div>📅 <strong>${t.duration.nights}N / ${t.duration.days}D</strong></div>
    ${t.departureCity?`<div>🛫 Departs from <strong>${t.departureCity}</strong></div>`:''}
    ${t.nextDeparture?`<div>🗓️ Next: <strong>${t.nextDeparture}</strong></div>`:''}
    <div>💰 From <strong>₹${(t.basePrice||0).toLocaleString()}</strong></div>
  </div>
  ${t.overview?`<p style="font-size:15px;line-height:1.8;color:#4B4741;margin-bottom:8px">${t.overview}</p>`:''}
  ${(t.highlights||[]).length?`<div class="section-title">Key Highlights</div><ul>${t.highlights.map(h=>`<li>${h}</li>`).join('')}</ul>`:''}
  ${(t.itinerary||[]).length?`<div class="section-title">Day-by-Day Itinerary</div>${t.itinerary.map(d=>`
    <div class="day">
      <div class="day-num">Day ${d.day}</div>
      <div class="day-title">${d.title||''}</div>
      <div class="day-desc">${d.description||''}</div>

    </div>`).join('')}`:''}
  ${((t.inclusions||[]).length||(t.exclusions||[]).length)?`

  <div class="foot">Generated by Nomichi CMS &nbsp;·&nbsp; hello@nomichi.com &nbsp;·&nbsp; @nomichi.travel</div>
  </body></html>`;

function saveTripFull(id) {
  const t = id ? DB.trips.find(x=>x.id===id) : null;
  const now = window._lbData || {};
  const data = {
    name: document.getElementById('t-name')?.value || '',
    slug: document.getElementById('t-slug')?.value || '',
    location: document.getElementById('t-loc')?.value || '',
    flag: document.getElementById('t-flag')?.value || '🇮🇳',
    duration: { days: +document.getElementById('t-days')?.value||7, nights: +document.getElementById('t-nights')?.value||6 },
    basePrice: +document.getElementById('t-price')?.value||0,
    originalPrice: document.getElementById('t-origprice')?.value ? +document.getElementById('t-origprice').value : null,
    totalSlots: +document.getElementById('t-slots')?.value||16,
    bookedSlots: +document.getElementById('t-booked')?.value||0,
    departureCity: document.getElementById('t-depcity')?.value||'',
    nextDeparture: document.getElementById('t-nextdep')?.value||'',
    coverImage: document.getElementById('t-cover')?.value||'',
    overview: document.getElementById('t-overview')?.value||'',
    tier: document.getElementById('t-tier')?.value||'join-a-trip',
    filterType: document.getElementById('t-ftype')?.value||'dom',
    filterDest: document.getElementById('t-fdest')?.value||'india',
    filterCategory: document.getElementById('t-fcat')?.value||'community',
    filterDuration: document.getElementById('t-fdur')?.value||'7plus',
    signatureSubtype: document.getElementById('t-sigtype')?.value||null,
    isActive: document.getElementById('t-active')?.checked ?? true,
    isFeatured: document.getElementById('t-featured')?.checked ?? false,
    showOnHomepage: document.getElementById('t-homepage')?.checked ?? false,
    avgRating: +document.getElementById('t-rating')?.value||0,
    reviewCount: +document.getElementById('t-revcount')?.value||0,
    month: document.getElementById('t-month')?.value||'flex',
    tags: (document.getElementById('t-tags')?.value||'').split(',').map(s=>s.trim()).filter(Boolean),
    relatedTrips: DB.trips.filter(x=>x.id!==id && document.getElementById('rel-'+x.id)?.checked).map(x=>x.id),
    highlights: now.highlights||[],
    inclusions: now.inclusions||[],
    exclusions: now.exclusions||[],
    itinerary: now.itin||[]
  };
  if (!data.name) { toast('Trip name is required','err'); return; }
  if (id) {
    const idx = DB.trips.findIndex(x=>x.id===id);
    DB.trips[idx] = { ...DB.trips[idx], ...data };
    toast('Trip updated successfully ✅');
  } else {
    data.id = DB.trips.length ? Math.max(...DB.trips.map(x=>x.id))+1 : 1;
    data.isVisible = true; data.avgRating = data.avgRating||0; data.reviewCount = data.reviewCount||0;
    DB.trips.push(data);
    toast('Trip created successfully ✅');
  }
  closeModal();
  render();
}

// ── SAVE FUNCTIONS ─────────────────────────────────────────────────────
function saveTrip(id) {
  const relatedIds = Array.from(document.querySelectorAll('input[id^="rel-"]:checked')).map(el=>parseInt(el.id.split('-')[1]));
  const data = {
    name:document.getElementById('trip-name').value,
    slug:document.getElementById('trip-slug').value,
    location:document.getElementById('trip-loc').value,
    duration:{days:parseInt(document.getElementById('trip-days').value),nights:parseInt(document.getElementById('trip-days').value)-1},
    basePrice:parseInt(document.getElementById('trip-price').value),
    originalPrice:document.getElementById('trip-orig-price').value?parseInt(document.getElementById('trip-orig-price').value):null,
    totalSlots:parseInt(document.getElementById('trip-slots').value),
    bookedSlots:parseInt(document.getElementById('trip-booked').value),
    overview:document.getElementById('trip-overview').value,
    tier:document.getElementById('trip-tier').value,
    filterType:document.getElementById('trip-filter-type').value,
    filterDest:document.getElementById('trip-filter-dest').value,
    filterCategory:document.getElementById('trip-filter-cat').value,
    filterDuration:document.getElementById('trip-filter-dur').value,
    departureCity:document.getElementById('trip-dept-city').value,
    nextDeparture:document.getElementById('trip-next-dept').value,
    spotsLeft:parseInt(document.getElementById('trip-spots-left').value),
    signatureSubtype:document.getElementById('trip-sig-subtype').value||null,
    relatedTrips:relatedIds
  };
  if(id) {
    Object.assign(DB.trips.find(t=>t.id===id),data);
    toast('Trip updated','ok');
  } else {
    const newId = Math.max(...DB.trips.map(t=>t.id))+1;
    DB.trips.push({id:newId,...data,tripType:'community',tags:[],month:'jun',coverImage:'',isActive:true,isFeatured:false,showOnHomepage:true,isVisible:true,avgRating:0,reviewCount:0,highlights:[],inclusions:[],exclusions:[],itinerary:[]});
    toast('Trip created','ok');
  }
  closeModal();
  render();
}

// ── DELETE FUNCTIONS ───────────────────────────────────────────────────
function deleteTrip(id) { if(confirm('Delete this trip?')) { DB.trips=DB.trips.filter(t=>t.id!==id); toast('Trip deleted','ok'); render(); } }
function deleteMoment(id) { if(confirm('Delete this location?')) { DB.rawMoments=DB.rawMoments.filter(m=>m.id!==id); toast('Location deleted','ok'); render(); } }
function deleteIdentity(id) { if(confirm('Delete this card?')) { DB.identityCards=DB.identityCards.filter(c=>c.id!==id); toast('Card deleted','ok'); render(); } }
function deleteReview(id) { if(confirm('Delete this review?')) { DB.reviews=DB.reviews.filter(r=>r.id!==id); toast('Review deleted','ok'); render(); } }
function deleteImage(id) { DB.gallery=DB.gallery.filter(g=>g.id!==id); toast('Image removed','ok'); render(); }
function deleteSugg(id) { if(confirm('Delete this suggestion?')) { DB.suggestions=DB.suggestions.filter(s=>s.id!==id); toast('Suggestion deleted','ok'); render(); } }
function deleteFaq(id) { if(confirm('Delete this FAQ?')) { DB.faqs=DB.faqs.filter(f=>f.id!==id); toast('FAQ deleted','ok'); render(); } }
function deleteTeam(id) { if(confirm('Delete this member?')) { DB.team=DB.team.filter(m=>m.id!==id); toast('Member deleted','ok'); render(); } }
function deleteCareer(id) { if(confirm('Delete this position?')) { DB.careers=DB.careers.filter(c=>c.id!==id); toast('Position deleted','ok'); render(); } }

// ── TOGGLE FUNCTIONS ───────────────────────────────────────────────────
function toggleTrip(id,field,val) { DB.trips.find(t=>t.id===id)[field]=val; render(); }
function toggleFeatured(id) { const img=DB.gallery.find(g=>g.id===id); img.isFeatured=!img.isFeatured; render(); }
function toggleReviewApproval(id) { const r=DB.reviews.find(r=>r.id===id); r.isApproved=!r.isApproved; render(); }
function toggleFaqActive(id,val) { DB.faqs.find(f=>f.id===id).isActive=val; render(); }
function toggleMomentFeatured(id) { const m=DB.rawMoments.find(m=>m.id===id); m.isFeatured=!m.isFeatured; render(); }
function toggleStar(id) { const s=DB.suggestions.find(s=>s.id===id); s.isStarred=!s.isStarred; render(); }
function updateSuggStatus(id,status) { DB.suggestions.find(s=>s.id===id).status=status; render(); }

// ── FILTER FUNCTIONS ───────────────────────────────────────────────────
function setTripFilter(f) {
  tripFilter=f; window._tripFilter=f;
  document.getElementById('trips-tbody').innerHTML=buildTripsCards(DB.trips);
  document.querySelectorAll('.tflt').forEach(b=>b.classList.toggle('tflt-on', b.textContent.trim().toLowerCase().replace(/ /g,'-')===f||(f==='all'&&b.textContent.trim()==='All')));
}
function filterTrips(q) {
  const filtered=DB.trips.filter(t=>t.name.toLowerCase().includes(q.toLowerCase())||t.location.toLowerCase().includes(q.toLowerCase()));
  document.getElementById('trips-tbody').innerHTML=buildTripsCards(filtered);
}
function filterSugg(s) { suggFilter=s; document.getElementById('sugg-grid').innerHTML=buildSuggCards(DB.suggestions); }
function filterFaqs(c) { faqFilter=c; document.getElementById('faq-table').innerHTML=buildFaqTable(DB.faqs); }

// ── APP ────────────────────────────────────────────────────────────────
function buildApp() {
  const content = {
    dashboard:buildDashboard,
    trips:buildTrips,
    reviews:buildReviews,
    media:buildMedia,
    identity:buildIdentityCards,
    suggestions:buildSuggestions,
    faqs:buildFaqs,
    team:buildTeam,
    careers:buildCareers,
    settings:buildSettings
  };
  return `
    ${buildSidebar()}
    <div class="main">
      <div class="topbar">
        <span style="font-weight:600;font-size:15px">Nomichi CMS v2</span>
        <div style="margin-left:auto;font-size:13px;color:var(--mid)">Last sync: just now</div>
      </div>
      <div class="content">
        ${(content[currentPage]||buildDashboard)()}
      </div>
    </div>`;
}

function navTo(page) { currentPage=page; render(); }
function setMediaTab(tab) { mediaTab=tab; document.querySelector('.main .content').innerHTML=(buildMedia()); }
function closeModal() { document.querySelector('.overlay')?.remove(); }
function switchTab(tab) { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('[id^="tab-"]').forEach(t=>t.style.display='none'); event.target.classList.add('active'); document.getElementById('tab-'+tab).style.display='block'; }
function uploadImage() { toast('Image upload not implemented in demo','ok'); }

function attachEvents() {}

// ── INIT ───────────────────────────────────────────────────────────────
render();
</script>
